name: E2E (Linux / WebKitGTK — Steam Deck 代理)

on:
  workflow_dispatch:
# Linux E2E 改為手動觸發；日常用 act 本機跑（CLAUDE.md 規範）。
# 發 release 前若需 GitHub runner 驗證，從 Actions 頁面手動 Run workflow。

jobs:
  e2e-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb \
            webkit2gtk-driver \
            libwebkit2gtk-4.0-dev || true
          # webkit2gtk-driver (4.0) 可能已退場；若不存在試 apt 搜尋
          sudo apt-get install -y webkit2gtk-driver 2>&1 | tail -n 5 || true

      - name: Locate WebKitWebDriver
        run: |
          set +e
          echo "=== searching /usr and /opt ==="
          find /usr /opt -name 'WebKitWebDriver*' 2>/dev/null
          echo "=== dpkg search ==="
          dpkg -L webkit2gtk-driver 2>/dev/null | grep -E 'WebKit|driver' || true
          dpkg -L libwebkit2gtk-4.0-dev 2>/dev/null | grep -E 'WebKit|driver' || true
          dpkg -L libwebkit2gtk-4.1-0 2>/dev/null | grep -E 'WebKit|driver' || true
          echo "=== apt-file ==="
          sudo apt-get install -y apt-file > /dev/null 2>&1
          sudo apt-file update > /dev/null 2>&1
          apt-file search WebKitWebDriver 2>/dev/null | head
          echo "=== decision ==="
          DRIVER=$(find /usr /opt -name WebKitWebDriver -type f 2>/dev/null | head -n1)
          if [ -z "$DRIVER" ]; then
            echo "::error::WebKitWebDriver 找不到於任何已知路徑。Ubuntu 22.04 的 webkit2gtk 4.1 似未包 driver。"
            exit 1
          fi
          echo "Found at $DRIVER"
          sudo ln -sf "$DRIVER" /usr/local/bin/WebKitWebDriver
          WebKitWebDriver --version || true

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            waypoint/src-tauri/target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('waypoint/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: npm install
        working-directory: waypoint
        run: npm ci || npm install

      - name: Build frontend
        working-directory: waypoint
        run: npm run build

      - name: Build Tauri (release, no bundle)
        working-directory: waypoint
        run: npx tauri build --no-bundle

      - name: Run E2E (via xvfb)
        working-directory: waypoint
        env:
          WAYPOINT_BINARY: ${{ github.workspace }}/waypoint/src-tauri/target/release/waypoint
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" \
            npm run test:e2e

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wdio-logs-linux
          path: |
            waypoint/logs/
          retention-days: 14
          if-no-files-found: ignore
