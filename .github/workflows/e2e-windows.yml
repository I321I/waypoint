name: E2E (Windows / WebView2)

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  e2e-windows:
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            waypoint/src-tauri/target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('waypoint/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-

      - name: Prepare logs dir
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path waypoint/logs | Out-Null

      - name: Install tauri-driver
        shell: pwsh
        run: cargo install tauri-driver --locked *>&1 | Tee-Object -FilePath waypoint/logs/01-tauri-driver.log; exit $LASTEXITCODE

      - name: Install frontend dependencies
        working-directory: waypoint
        shell: pwsh
        run: |
          (npm ci *>&1) -join "`n" | Out-File -FilePath logs/02-npm-install.log -Encoding utf8
          if ($LASTEXITCODE -ne 0) { npm install *>&1 | Tee-Object -FilePath logs/02-npm-install.log -Append; exit $LASTEXITCODE }

      - name: Build frontend
        working-directory: waypoint
        shell: pwsh
        run: npm run build *>&1 | Tee-Object -FilePath logs/03-build-frontend.log; exit $LASTEXITCODE

      - name: Build Tauri binary (release, no bundle)
        working-directory: waypoint
        shell: pwsh
        run: npx tauri build --no-bundle *>&1 | Tee-Object -FilePath logs/04-tauri-build.log; exit $LASTEXITCODE

      - name: Locate msedgedriver (windows-latest 內建)
        shell: pwsh
        run: |
          $driver = Get-ChildItem -Path "C:\SeleniumWebDrivers" -Recurse -Filter msedgedriver.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $driver) { throw "msedgedriver.exe 找不到" }
          Add-Content $env:GITHUB_PATH $driver.DirectoryName
          Write-Host "msedgedriver at $($driver.FullName)"

      - name: Run E2E tests (capture stdout/stderr)
        working-directory: waypoint
        shell: pwsh
        env:
          WAYPOINT_BINARY: ${{ github.workspace }}\waypoint\src-tauri\target\release\waypoint.exe
        run: |
          New-Item -ItemType Directory -Force -Path logs | Out-Null
          npm run test:e2e *>&1 | Tee-Object -FilePath logs/wdio-full.log
          exit $LASTEXITCODE

      - name: Upload E2E logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wdio-logs-${{ github.run_attempt }}
          path: |
            waypoint/logs/
            waypoint/.wdio-logs/
          retention-days: 14
          if-no-files-found: warn

      # 失敗時把所有 log push 到 ci-logs/<sha> 孤兒分支，方便用 MCP get_file_contents 免 token 讀取
      - name: Push logs to ci-logs branch on failure
        if: failure()
        shell: bash
        run: |
          set +e
          cd "$GITHUB_WORKSPACE"
          BR="ci-logs/${{ github.sha }}-${{ github.run_attempt }}"
          git config user.email "ci-bot@waypoint"
          git config user.name "ci-bot"
          git checkout --orphan "$BR"
          git rm -rf . >/dev/null 2>&1 || true
          mkdir -p logs
          if [ -d waypoint/logs ]; then cp -r waypoint/logs/. logs/ 2>/dev/null || true; fi
          if [ -d waypoint/.wdio-logs ]; then cp -r waypoint/.wdio-logs logs/wdio-logs-dir 2>/dev/null || true; fi
          ls -la logs/ > logs/_INDEX.txt 2>&1 || true
          echo "github.sha=${{ github.sha }}" > logs/_meta.txt
          echo "attempt=${{ github.run_attempt }}" >> logs/_meta.txt
          echo "run_id=${{ github.run_id }}" >> logs/_meta.txt
          git add -A logs/
          git commit -m "ci log ${{ github.sha }} attempt ${{ github.run_attempt }}" --allow-empty
          git push origin "$BR" --force
