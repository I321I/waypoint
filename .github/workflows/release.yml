name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''
          - platform: ubuntu-22.04-arm
            args: '--target aarch64-unknown-linux-gnu'
          - platform: macos-latest
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build release notes from tag annotation
        id: notes
        shell: bash
        run: |
          git fetch --tags --force origin >/dev/null 2>&1 || true
          msg=$(git for-each-ref --format='%(contents:body)' "refs/tags/${{ github.ref_name }}" 2>/dev/null || true)
          if [ -z "$msg" ]; then
            msg=$(git tag -l --format='%(contents)' "${{ github.ref_name }}")
          fi
          if [ -z "$msg" ]; then
            msg="(此版本沒有附 tag 註解)"
          fi
          {
            echo "body<<WAYPOINT_EOF"
            echo "## 本版修正"
            echo ""
            echo "$msg"
            echo ""
            echo "---"
            echo ""
            echo "## 安裝方式"
            echo "- **Windows**：下載 \`.msi\` 或 \`-setup.exe\` 安裝"
            echo "- **Steam Deck（Flatpak，推薦）**：下載 \`_x86_64.flatpak\`，Desktop Mode 執行 \`flatpak install --user ./io.github.i321i.waypoint_x86_64.flatpak\`"
            echo "- **Linux x86_64（AppImage）**：下載 \`_amd64.AppImage\`，賦予執行權限後執行"
            echo "- **Linux aarch64（Flatpak）**：下載 \`_aarch64.flatpak\`，執行 \`flatpak install --user ./io.github.i321i.waypoint_aarch64.flatpak\`"
            echo "- **Linux aarch64（AppImage）**：下載 \`_aarch64.AppImage\`，賦予執行權限後執行"
            echo "- **macOS**：下載 \`.dmg\` 安裝"
            echo "WAYPOINT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.platform == 'ubuntu-22.04-arm' && 'aarch64-unknown-linux-gnu' || '' }}

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Install aarch64 cross-compile tools
        if: matrix.platform == 'ubuntu-22.04-arm'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install frontend dependencies
        working-directory: waypoint
        run: npm install

      - name: Build frontend
        working-directory: waypoint
        run: npm run build

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: waypoint
          tagName: ${{ github.ref_name }}
          releaseName: 'Waypoint ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Install flatpak-builder
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Build Flatpak
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cp waypoint/src-tauri/target/release/waypoint waypoint/flatpak/waypoint
          flatpak-builder --repo=flatpak-repo --force-clean --arch=x86_64 flatpak-build \
            waypoint/flatpak/io.github.i321i.waypoint.yml
          flatpak build-bundle flatpak-repo \
            io.github.i321i.waypoint_x86_64.flatpak \
            io.github.i321i.waypoint --arch=x86_64 \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak (aarch64)
        if: matrix.platform == 'ubuntu-22.04-arm'
        run: |
          cp waypoint/src-tauri/target/aarch64-unknown-linux-gnu/release/waypoint waypoint/flatpak/waypoint
          flatpak-builder --repo=flatpak-repo --force-clean --arch=aarch64 flatpak-build \
            waypoint/flatpak/io.github.i321i.waypoint.yml
          flatpak build-bundle flatpak-repo \
            io.github.i321i.waypoint_aarch64.flatpak \
            io.github.i321i.waypoint --arch=aarch64 \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo

      - name: Upload Flatpak to Release
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          files: io.github.i321i.waypoint_x86_64.flatpak

      - name: Upload Flatpak to Release (aarch64)
        if: matrix.platform == 'ubuntu-22.04-arm'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          files: io.github.i321i.waypoint_aarch64.flatpak
