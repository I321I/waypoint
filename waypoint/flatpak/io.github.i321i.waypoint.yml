app-id: io.github.i321i.waypoint
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: waypoint

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=session-bus
  - --filesystem=~/waypoint
  - --filesystem=~/.config/autostart:create
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.StatusNotifierWatcher
  # global shortcut（KDE kglobalaccel + XDG portal）
  - --talk-name=org.kde.kglobalaccel
  - --talk-name=org.freedesktop.portal.Desktop
  # X11 global key grab（fallback-x11 模式下 XGrabKey 需要此權限）
  - --device=dri

modules:
  - name: waypoint
    buildsystem: simple
    build-commands:
      - install -Dm755 waypoint /app/bin/waypoint
      - install -Dm644 io.github.i321i.waypoint.desktop /app/share/applications/io.github.i321i.waypoint.desktop
      - install -Dm644 128x128.png /app/share/icons/hicolor/128x128/apps/io.github.i321i.waypoint.png
    sources:
      - type: file
        path: waypoint
      - type: file
        path: io.github.i321i.waypoint.desktop
      - type: file
        path: ../src-tauri/icons/128x128.png
