name: E2E (Windows / WebView2)

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  e2e-windows:
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            waypoint/src-tauri/target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('waypoint/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install frontend dependencies
        working-directory: waypoint
        run: npm ci || npm install

      - name: Build frontend
        working-directory: waypoint
        run: npm run build

      - name: Build Tauri binary (release, no bundle)
        working-directory: waypoint
        run: npx tauri build --no-bundle

      - name: Locate msedgedriver (windows-latest 內建)
        shell: pwsh
        run: |
          $driver = Get-ChildItem -Path "C:\SeleniumWebDrivers" -Recurse -Filter msedgedriver.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $driver) { throw "msedgedriver.exe 找不到" }
          Add-Content $env:GITHUB_PATH $driver.DirectoryName
          Write-Host "msedgedriver at $($driver.FullName)"

      - name: Run E2E tests (capture stdout/stderr)
        working-directory: waypoint
        shell: pwsh
        env:
          WAYPOINT_BINARY: ${{ github.workspace }}\waypoint\src-tauri\target\release\waypoint.exe
        run: |
          New-Item -ItemType Directory -Force -Path logs | Out-Null
          npm run test:e2e *>&1 | Tee-Object -FilePath logs/wdio-full.log
          exit $LASTEXITCODE

      - name: Upload E2E logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wdio-logs-${{ github.run_attempt }}
          path: |
            waypoint/logs/
            waypoint/.wdio-logs/
          retention-days: 14
          if-no-files-found: warn

      # 失敗時把 log push 到 ci-logs/<sha> 孤兒分支，方便用 MCP get_file_contents 免 token 讀取
      - name: Push logs to ci-logs branch on failure
        if: failure()
        shell: bash
        working-directory: waypoint
        run: |
          set -e
          if [ ! -f logs/wdio-full.log ]; then
            echo "no log to push"; exit 0
          fi
          cd "$GITHUB_WORKSPACE"
          BR="ci-logs/${{ github.sha }}-${{ github.run_attempt }}"
          git config user.email "ci-bot@waypoint"
          git config user.name "ci-bot"
          git checkout --orphan "$BR"
          git rm -rf . >/dev/null 2>&1 || true
          cp waypoint/logs/wdio-full.log ./wdio-full.log
          [ -d waypoint/.wdio-logs ] && cp -r waypoint/.wdio-logs ./wdio-logs-dir || true
          git add -A
          git commit -m "ci log ${{ github.sha }} attempt ${{ github.run_attempt }}"
          git push origin "$BR" --force
